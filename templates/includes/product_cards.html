<div class="product-grid">
    {% for product in products %}
        <div class="product">
            <a href="{% url 'catalog:product' product.slug %}">
                <img src="{{ product.image.url }}" alt="{{ product.name }}">
                <h3>{{ product.name }}</h3>
                <p>{{ product.description|truncatechars:20 }}</p>
                <p>Цена: {{ product.price }} Р</p>
            </a>
        </div>
    {% endfor %}
</div>
